version: 2
updates:
  # Root + workspace packages (npm/pnpm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    reviewers: []

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
