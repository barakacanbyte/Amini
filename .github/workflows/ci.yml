name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # bun.lock in this repo is lockfileVersion 1 (Bun 1.2+).
  # Using "latest" avoids lockfile format mismatches on CI.
  BUN_VERSION: "latest"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: ESLint
        run: bun lint

      - name: Prettier check
        # Use bunx to guarantee Prettier exists in CI even if workspace installs change.
        run: bunx --bun prettier@3.2.5 --check "**/*.{ts,tsx,js,json,md}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Build shared
        run: bun --filter @amini/shared build

      - name: Build eas-schemas
        run: bun --filter @amini/eas-schemas build

      - name: Build indexer
        run: bun --filter indexer build

      - name: Build frontend
        run: bun --filter frontend build
        env:
          NEXT_PUBLIC_RPC_URL: "https://sepolia.base.org"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_XMTP_ENV: "dev"
          NEXT_PUBLIC_CDP_PROJECT_ID: "placeholder"

  contracts:
    name: Forge Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
