name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  FOUNDRY_PROFILE: default

jobs:
  # ── Lint & Format ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier (check only)
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,json,md}"

  # ── Build all TypeScript packages ──────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared + eas-schemas
        run: |
          pnpm --filter @amini/shared build
          pnpm --filter @amini/eas-schemas build

      - name: Build indexer
        run: pnpm --filter indexer build

      - name: Build frontend (Next.js)
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_RPC_URL: "https://sepolia.base.org"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_XMTP_ENV: "dev"

  # ── Foundry contract tests ─────────────────────────────────────
  contracts:
    name: Forge Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv
