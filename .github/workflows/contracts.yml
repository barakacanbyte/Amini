name: Contracts

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/src/**"
      - "packages/contracts/test/**"
      - "packages/contracts/script/**"
      - "packages/contracts/foundry.toml"
  pull_request:
    paths:
      - "packages/contracts/src/**"
      - "packages/contracts/test/**"
      - "packages/contracts/script/**"
      - "packages/contracts/foundry.toml"

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/contracts

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv --gas-report

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Generate coverage
        run: forge coverage --report summary >> "$GITHUB_STEP_SUMMARY"

  gas-snapshot:
    name: Gas Snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Snapshot
        run: forge snapshot

      - name: Post to summary
        run: |
          echo '### Gas Snapshot' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat .gas-snapshot >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
