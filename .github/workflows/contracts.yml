name: Contracts

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
  pull_request:
    paths:
      - "packages/contracts/**"

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/contracts

jobs:
  test:
    name: Forge Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Tests (verbose)
        run: forge test -vvv --gas-report

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Generate coverage
        run: forge coverage --report lcov

      - name: Upload coverage to GitHub summary
        run: forge coverage | tail -n +3 >> "$GITHUB_STEP_SUMMARY"

  snapshot:
    name: Gas Snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Generate gas snapshot
        run: forge snapshot

      - name: Post snapshot diff to PR
        run: |
          echo '### Gas Snapshot' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat .gas-snapshot >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
