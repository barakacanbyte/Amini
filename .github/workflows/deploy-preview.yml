name: Deploy Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"

jobs:
  preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    # Only run if Vercel secrets are configured
    if: vars.VERCEL_PROJECT_ID != ''
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared deps
        run: |
          pnpm --filter @amini/shared build
          pnpm --filter @amini/eas-schemas build

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel config
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/frontend

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/frontend

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: packages/frontend

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `### 🔗 Preview deployment\n\n${url}\n\n_Deployed from commit ${context.sha.slice(0, 7)}_`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
