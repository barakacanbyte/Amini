name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "20"

jobs:
  # ── npm dependency audit ───────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod || true

      - name: Check for known vulnerabilities
        run: |
          RESULT=$(pnpm audit --prod --json 2>/dev/null || true)
          CRITICAL=$(echo "$RESULT" | grep -c '"severity":"critical"' || true)
          HIGH=$(echo "$RESULT" | grep -c '"severity":"high"' || true)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities"
            exit 1
          fi

  # ── Slither static analysis for Solidity ───────────────────────
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        working-directory: packages/contracts
        run: forge build

      - uses: crytic/slither-action@v0.4.1
        continue-on-error: true
        with:
          target: packages/contracts
          slither-config: packages/contracts/slither.config.json
          fail-on: medium
          sarif: results/slither.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results/slither.sarif
