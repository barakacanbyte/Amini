name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.1"

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Check for known vulnerabilities
        run: |
          bun pm audit 2>&1 | tee audit-output.txt || true
          if grep -qi "critical" audit-output.txt; then
            echo "::error::Critical vulnerabilities found"
            cat audit-output.txt >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "No critical vulnerabilities found" >> "$GITHUB_STEP_SUMMARY"

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        working-directory: packages/contracts
        run: forge build

      - uses: crytic/slither-action@v0.4.1
        continue-on-error: true
        with:
          target: packages/contracts
          slither-config: packages/contracts/slither.config.json
          fail-on: medium
          sarif: results/slither.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results/slither.sarif
